name: CE Tools Core Tests

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test-core:
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Validate report presentation source
        run: python3 scripts/Validate-ReportPresentation.py

      - name: Validate shared annotation source
        run: python3 scripts/Validate-AnnotationCommands.py

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Run geometry tests
        run: dotnet run --project tests/CE.Tools.Core.Tests/CE.Tools.Core.Tests.csproj -c Release
